services:
  db:
    image: mysql:8.0
    container_name: db_proyecto
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: portafolio_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql

  web:
    image: php:8.2-apache
    container_name: web_proyecto
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./reportes:/var/www/html/reportes
    depends_on:
      - db
    command: >
      sh -c "docker-php-ext-install pdo pdo_mysql && apache2-foreground"
  python_app:
    build: ./script
    container_name: python_reporte
    tty: true
    stdin_open: true
    volumes:
      - ./reportes:/app/output
    depends_on:
      - db
volumes:
  db_data: 
  reportes_vol: